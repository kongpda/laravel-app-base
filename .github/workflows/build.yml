name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
  schedule:
    # Weekly rebuild (Mon 06:00 UTC) to pull upstream serversideup + Debian
    # security updates and re-run the Trivy scan gate, so the base doesn't drift.
    - cron: '0 6 * * 1'

env:
  REGISTRY: ghcr.io

jobs:
  # Fail fast on leaked secrets in the source before anything is built.
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Secret scan (source)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret
          exit-code: '1'

  build:
    needs: secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: laravel-app-base
            dockerfile: Dockerfile
          - name: laravel-app-ssr
            dockerfile: Dockerfile.ssr
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=sha,format=short

      # Build to the local daemon (single-arch amd64, so load works). No push yet.
      - name: Build (load, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          load: true
          tags: scan-target:${{ matrix.name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Gate: fail (and skip push) on baked secrets or FIXABLE HIGH/CRITICAL CVEs.
      # ignore-unfixed avoids blocking on upstream OS CVEs that have no fix yet.
      - name: Scan image (vuln + secret)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: scan-target:${{ matrix.name }}
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      # Scan passed -> push. Layers are cached, so this is near-instant.
      - name: Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
